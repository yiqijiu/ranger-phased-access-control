# Governance HTTP client default config for Hive plugin.
# Priority:
# 1) JVM -Dgovernance.client.* system properties
# 2) hive-site.xml (HiveConf key with same name)
# 3) this file defaults

governance.client.base-url=http://127.0.0.1:8080
governance.client.decide-path=/api/v1/governance/decision
governance.client.msg-fail-path=/api/v1/governance/msg-fail
governance.client.connect-timeout-ms=200
governance.client.socket-timeout-ms=500
governance.client.connection-request-timeout-ms=100
governance.client.max-total=512
governance.client.max-per-route=256
governance.client.keep-alive-ms=30000
